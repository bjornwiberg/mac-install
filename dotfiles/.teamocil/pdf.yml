windows:
  - name: pdf
    root: ~/Sites/matilda-menu-pdf
    layout: even-vertical
    panes:
      - commands:
          - tmux set-option -p -t :.0 @name nvim
          - tmux set-option -p -t :.1 @name pdf-server
          - nvim
      - commands:
          - PORT=9000 yarn start
        focus: true
